name: taworld
description: "Ta的世界 — 以关怀为核心的情感连接APP"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  # 路由
  go_router: ^15.1.2

  # 网络请求（仅用于外部 API: DeepSeek / 和风天气）
  dio: ^5.8.0+1

  # 本地存储
  shared_preferences: ^2.5.3
  sqflite: ^2.4.2
  path: ^1.9.0

  # 工具
  uuid: ^4.5.1
  intl: ^0.20.2
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.2
  shimmer: ^3.0.0
  flutter_svg: ^2.0.16

  # 本地通知
  flutter_local_notifications: ^18.0.0

  # 权限 & 硬件
  permission_handler: ^11.3.1
  geolocator: ^13.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
