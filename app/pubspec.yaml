name: taworld
description: "Ta的世界 — 以关怀为核心的情感连接APP"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  # 状态管理
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # 路由
  go_router: ^15.1.2

  # 网络请求
  dio: ^5.8.0+1

  # 本地存储
  shared_preferences: ^2.5.3
  hive_flutter: ^1.1.0
  hive: ^2.2.3

  # 工具
  intl: ^0.20.2
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.2
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.16

  # 推送 & 定位
  # firebase_messaging: ^15.1.6    # 需要 Firebase 配置后启用
  # geolocator: ^13.0.2            # 需要权限配置后启用

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^2.6.3
  build_runner: ^2.4.15

flutter:
  uses-material-design: true
