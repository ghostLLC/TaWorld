name: taworld
description: "Ta的世界 — 以关怀为核心的情感连接APP"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # 路由
  go_router: ^15.1.2

  # 网络请求（仅用于外部 API: DeepSeek / wttr.in）
  dio: ^5.8.0+1

  # 本地存储
  shared_preferences: ^2.5.3
  sqflite: ^2.4.2
  path: ^1.9.0
  path_provider: ^2.1.5

  # 工具
  uuid: ^4.5.1
  intl: ^0.20.2
  flutter_animate: ^4.5.2
  url_launcher: ^6.3.1

  # 本地通知 & 定时
  flutter_local_notifications: ^18.0.0
  timezone: ^0.10.0
  workmanager: ^0.9.0+3

  # 权限 & 硬件
  permission_handler: ^11.3.1
  geolocator: ^13.0.2
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/

  fonts:
    - family: Nunito
      fonts:
        - asset: assets/fonts/Nunito-Regular.ttf
          weight: 400
        - asset: assets/fonts/Nunito-Medium.ttf
          weight: 500
        - asset: assets/fonts/Nunito-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Nunito-Bold.ttf
          weight: 700
